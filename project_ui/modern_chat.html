<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Modern Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .chat-bubble { max-width: 80%; padding: 0.75rem 1.25rem; border-radius: 1.25rem; }
        .ai-message { background-color: #f3f4f6; color: #111827; border-bottom-left-radius: 0.25rem; }
        .user-message { background-color: #111827; color: #ffffff; border-bottom-right-radius: 0.25rem; }
        .dark .ai-message { background-color: #1f2937; color: #f3f4f6; }
        .dark .user-message { background-color: #3b82f6; color: #ffffff; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .typing-dot { width: 4px; height: 4px; background: currentColor; border-radius: 50%; display: inline-block; margin: 0 1px; animation: pulse 1s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-white dark:bg-[#0b0b0b] transition-colors duration-300">
    <div id="app" class="flex h-screen w-full overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 md:w-80 flex-shrink-0 bg-gray-50 dark:bg-[#121212] border-r border-gray-200 dark:border-gray-800 flex flex-col">
            <div class="p-4">
                <button onclick="newChat()" class="w-full h-12 flex items-center justify-center gap-2 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-xl hover:bg-gray-100 dark:hover:bg-[#222] transition-colors shadow-sm font-medium dark:text-gray-200">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
            </div>
            <div class="flex-1 overflow-y-auto px-2 space-y-1 no-scrollbar">
                <div class="px-3 mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-400">History</div>
                <div class="chat-item active p-3 rounded-lg bg-gray-200 dark:bg-[#1a1a1a] text-sm font-medium cursor-pointer dark:text-gray-100">
                    Research on AI Architecture
                </div>
                <div class="chat-item p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-[#1a1a1a] text-sm text-gray-500 cursor-pointer">
                    Tailwind CSS Components
                </div>
            </div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <button onclick="toggleTheme()" class="flex items-center gap-2 text-sm text-gray-500 font-medium">
                    <svg id="theme-toggle-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 110 8 4 4 0 010-8z"></path></svg>
                    Theme
                </button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col relative bg-white dark:bg-[#0b0b0b]">
            <!-- Header -->
            <header class="h-14 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between px-6 bg-white dark:bg-[#0b0b0b]">
                <h2 class="text-sm font-bold dark:text-gray-200 uppercase tracking-widest">Nexus Chat</h2>
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white text-[10px] font-bold">U</div>
            </header>

            <!-- Chat Container -->
            <div id="chat-container" class="flex-1 overflow-y-auto px-4 md:px-0 py-10 space-y-8 no-scrollbar">
                <div class="max-w-3xl mx-auto flex flex-col gap-6">
                    <!-- AI -->
                    <div class="flex flex-col items-start gap-2">
                        <div class="chat-bubble ai-message text-sm leading-relaxed">
                            Hello! How can I help you today?
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-6 md:p-10 w-full bg-gradient-to-t from-white dark:from-[#0b0b0b] via-white dark:via-[#0b0b0b] to-transparent sticky bottom-0">
                <div class="max-w-3xl mx-auto">
                    <div class="relative flex items-end gap-2 p-2 bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-2xl focus-within:border-gray-300 dark:focus-within:border-gray-700 transition-all">
                        <button class="p-3 text-gray-400"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"></path></svg></button>
                        <textarea id="user-input" rows="1" placeholder="Send a message..." class="flex-1 h-12 py-3.5 bg-transparent border-none focus:ring-0 text-sm dark:text-gray-200 resize-none"></textarea>
                        <button onclick="handleSend()" class="p-3 bg-gray-900 dark:bg-blue-600 text-white rounded-xl active:scale-95 transition-all"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </div>
                    <div class="text-center mt-3 text-[10px] text-gray-400 font-medium uppercase tracking-[0.2em]">Powered by Nexus AI</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatContainer = document.querySelector('#chat-container > div');
        const userInput = document.getElementById('user-input');

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        function handleSend() {
            const text = userInput.value.trim();
            if(!text) return;
            
            // Add user message
            const userBubble = document.createElement('div');
            userBubble.className = 'flex flex-col items-end gap-2';
            userBubble.innerHTML = `<div class="chat-bubble user-message text-sm leading-relaxed">${text}</div>`;
            chatContainer.appendChild(userBubble);
            
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Add typing indicator
            const typingBubble = document.createElement('div');
            typingBubble.id = 'typing-indicator';
            typingBubble.className = 'flex flex-col items-start gap-2';
            typingBubble.innerHTML = `<div class="chat-bubble ai-message text-sm"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatContainer.appendChild(typingBubble);
            
            chatContainer.parentElement.scrollTo({ top: chatContainer.parentElement.scrollHeight, behavior: 'smooth' });

            // Simulate AI
            setTimeout(() => {
                document.getElementById('typing-indicator').remove();
                const aiBubble = document.createElement('div');
                aiBubble.className = 'flex flex-col items-start gap-2';
                aiBubble.innerHTML = `<div class="chat-bubble ai-message text-sm leading-relaxed">This is a modern, high-performance UI tailored to your request. I am a code-first generator and I've built this to be robust and instantly responsive.</div>`;
                chatContainer.appendChild(aiBubble);
                chatContainer.parentElement.scrollTo({ top: chatContainer.parentElement.scrollHeight, behavior: 'smooth' });
            }, 1500);
        }

        userInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Auto-expand textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        });

        // Default to dark mode
        document.documentElement.classList.add('dark');
    </script>
</body>
</html>
