  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart RAG Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="overlay" id="overlay"></div>
 
  <div class="layout">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sb-header">
        <div class="sb-logo">
          <div class="logo-icon">R</div>
          <span class="logo-text">Smart<span class="acc">RAG</span></span>
        </div>
        <div class="sb-header-actions">
          <button class="icon-btn" id="sidebarClose" title="Close sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
          </button>
          <button class="icon-btn" id="clearHistoryBtn" title="Clear history">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2m-6 5v6m4-6v6"/></svg>
          </button>
           <button class="icon-btn" id="newChatIcon" title="New chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
        </div>
      </div>
 

 
      <div class="sb-section-label">Chats & Sessions</div>
      <div class="sb-scroll" id="historyContainer"></div>
 
      <div class="sb-footer">
        <div class="sb-stats-row" id="sbStats">
          <!-- populated by JS -->
        </div>
        <div class="user-row" id="userRow">
          <div class="user-avatar">U</div>
          <div class="user-info">
            <span class="user-name">User</span>
            <span class="user-sub">Free Plan</span>
          </div>
          <button class="icon-btn logout-btn" title="Sign out" id="logoutBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </nav>
 
    <!-- MAIN -->
    <main class="main" id="main">
      <header class="topbar">
        <button class="icon-btn" id="sidebarOpen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
        </button>
        <div class="topbar-center">
          <span class="model-label" id="modelLabel">Smart RAG Assistant</span>
          <!-- Live accuracy badge -->
          <div class="acc-badge" id="accBadge" style="display:none">
            <span class="acc-dot"></span>
            <span id="accValue">—</span> accuracy
          </div>
        </div>
        <div class="topbar-right">
          <!-- Token usage chip -->
          <div class="token-chip" id="tokenChip" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span id="tokenCount">0 tokens</span>
          </div>
          <button class="icon-btn" id="topNewChat" title="New chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
        </div>
      </header>
 
      <div class="thread" id="thread">
        <div class="welcome" id="welcome">
          <div class="welcome-orb"></div>
          <h1 class="welcome-heading">How can I help you today?</h1>
          <p class="welcome-sub">Ask questions about your uploaded knowledge base</p>
          <div class="starters" id="starters">
            <button class="starter-btn" data-q="Explain what this knowledge base contains">
              <span class="s-icon">🗂</span>
              <span class="s-title">Explore Knowledge Base</span>
              <span class="s-sub">Understand what's indexed</span>
            </button>
            <button class="starter-btn" data-q="Summarize the most important documents in the knowledge base">
              <span class="s-icon">📋</span>
              <span class="s-title">Summarize Key Documents</span>
              <span class="s-sub">Get a high-level overview</span>
            </button>
            <button class="starter-btn" data-q="What are the latest updates or changes in the data?">
              <span class="s-icon">🔄</span>
              <span class="s-title">Find Latest Updates</span>
              <span class="s-sub">Track recent changes</span>
            </button>
            <button class="starter-btn" data-q="What insights can you extract from the indexed data?">
              <span class="s-icon">💡</span>
              <span class="s-title">Extract Insights</span>
              <span class="s-sub">Surface hidden patterns</span>
            </button>
          </div>
        </div>
        <div id="messages"></div>
      </div>
 
      <!-- Input -->
      <div class="input-area">
        <div class="input-box" id="inputBox">

    <!-- Upload Icon -->
<input type="file" id="fileInput" accept=".pdf,.docx" hidden>
<button type="button" id="uploadBtn" class="icon upload-icon" title="Upload document">➕</button>

    <!-- Single Textarea -->
          <textarea id="prompt" placeholder="Message Smart RAG Assistant…" rows="1"></textarea>

    <!-- Mic Icon -->
    <button class="icon mic-icon" id="micBtn">🎙️</button>

    <!-- Send Button -->
          <button class="send-btn" id="sendBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 32 32" fill="none">
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M15.192 8.906a1.143 1.143 0 011.616 0l5.143 5.143a1.143 1.143 0 01-1.616 1.616l-3.196-3.196v9.813a1.143 1.143 0 01-2.286 0v-9.813l-3.196 3.196a1.143 1.143 0 11-1.616-1.616l5.151-5.143z"
          fill="currentColor"/>
      </svg>
          </button>
        </div>

        <!-- Upload Progress -->
        <div id="uploadProgressWrap" class="upload-progress-wrap" style="display:none;">
          <div id="uploadProgressBar" class="upload-progress-bar"></div>
        </div>
        <div id="uploadStatus" class="upload-status"></div>
        <div id="uploadMessage" class="upload-message" style="display:none;"></div>

  <p class="disclaimer">
    Smart RAG can make mistakes. Verify important information.
  </p>
  </div>
 
  <!-- Chunk Detail Modal -->
  <div class="modal-overlay" id="chunkModal" style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title">Source Chunks</span>
        <button class="icon-btn" id="closeModal">✕</button>
      </div>
      <div class="modal-body" id="chunkBody"></div>
    </div>
  </div>
 
  <script src="/static/script.js"></script>
</body>
</html>
